# Polargraph Controller - Default Configuration
# These are the factory default settings for a standard polargraph machine

# Serial communication
controller.machine.serialport=COM3
controller.machine.baudrate=57600

# Machine specifications (in steps)
machine.width=2790
machine.height=2347
machine.motors.stepsPerRev=200.0
machine.motors.mmPerRev=40.0
machine.step.multiplier=4

# Motor performance
machine.motors.maxSpeed=1600
machine.motors.accel=1000

# Pen lift servo positions (PWM or analog values)
machine.penlift.up=15
machine.penlift.down=88
machine.pen.size=0.3

# Home position (in steps)
controller.homepoint.x=1395
controller.homepoint.y=1395

# Display settings
controller.window.width=1200
controller.window.height=800
controller.background.colour=646464
controller.page.colour=DCDCDC
controller.machine.colour=969696
controller.frame.colour=C80000
controller.guide.colour=FFFFFF
controller.densitypreview.colour=000000

# Drawing parameters
controller.grid.size=16.0
controller.pixel.scaling=1
controller.pixel.samplearea=16
controller.pixel.mask.color=00FF00

# Max segment length for moves
controller.maxSegmentLength=2

# Vector graphics
controller.vector.filename=
controller.vector.scaling=100.0
controller.vector.position.x=0.0
controller.vector.position.y=0.0
controller.vector.minLineLength=0

# Page layout (in steps from machine origin)
controller.page.position.x=839
controller.page.position.y=650
controller.page.width=1112
controller.page.height=1550

# Image frame
controller.image.position.x=936
controller.image.position.y=1093
controller.image.width=905
controller.image.height=605
controller.image.filename=

# Picture frame
controller.pictureframe.position.x=977
controller.pictureframe.position.y=1098
controller.pictureframe.width=836
controller.pictureframe.height=594

# Pen test parameters
controller.testPenWidth.startSize=0.5
controller.testPenWidth.endSize=2.0
controller.testPenWidth.incrementSize=0.5

# Density preview
controller.density.preview.style=0

# Advanced features (Phase 2+)
controller.geomerative.polygonizer=0
controller.geomerative.polygonizerLength=1.0

